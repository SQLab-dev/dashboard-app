<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NowBoard</title>
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/base.css">
        <link rel="stylesheet" href="css/components.css">
        <link rel="stylesheet" href="css/layout.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <div class="grid-container">
                <div class="card">
                </div>

                <div class="card">
                    <div class="time_text" id="time"></div>
                </div>

                <div class="card">
                    <div class="weather_location">
                        <img class="pin" src="images/pin.png">
                        <div class="reason_text">東京</div>
                    </div>
                    <div class="temp_text" id="temperature"></div>
                </div>

                <div class="card">
                    <div class=""></div>
                </div>
                
                <div class="card">
                    <div class="news_meta" id="news_meta"></div>
                    <a class="news_title" id="news_title"></a>
                </div>

                <div class="card"></div>
            </div>
        </main>
        <script src="js/main.js" defer></script>
        <script src="js/load_news.js" defer></script>
        <script src="js/get_weather.js" defer></script>
    </body>
</html>
